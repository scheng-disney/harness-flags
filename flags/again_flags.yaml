featureFlags:
  flags:
  - flag:
      name: My_Test_Flag
      identifier: My_Test_Flag
      description: "new description"
      permanent: false
      spec:
        type: boolean
        default:
          onVariation: "true"
          offVariation: "false"
        variations:
        - identifier: "true"
          value: "true"
        - identifier: "false"
          value: "false"
      environments:
      - identifier: test
        default:
          onVariation: "true"
          offVariation: "false"
        state: "off"
      - identifier: latest
        default:
          onVariation: "true"
          offVariation: "false"
        state: "off"
  projectIdentifier: harnessflags
  orgIdentifier: default
